spring:
  application:
    name: taskscope-dispatcher
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:taskscope}
    password: ${RABBITMQ_PASS:taskscope}

server:
  port: 8080

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0   # 개발 환경: 100% 샘플링
    propagation:
      type: w3c           # traceparent 헤더 포맷
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:14321}/v1/traces
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:14321}/v1/metrics
  endpoints:
    web:
      exposure:
        include: health,info,metrics
