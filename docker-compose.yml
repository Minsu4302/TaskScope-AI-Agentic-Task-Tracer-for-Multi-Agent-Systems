services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: taskscope-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-taskscope}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-taskscope}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: taskscope-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: taskscope-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "14320:4317"  # OTLP gRPC (앱 → Collector) — 기존 프로젝트 4317 충돌 회피
      - "14321:4318"  # OTLP HTTP (앱 → Collector) — 기존 프로젝트 4318 충돌 회피
      - "18889:8889"  # Prometheus scrape 엔드포인트
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: taskscope-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "19090:9090"  # 기존 프로젝트 9090 충돌 회피
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.0.0
    container_name: taskscope-grafana
    ports:
      - "3003:3000"   # 3001(구 grafana), 3002(langfuse) 충돌 회피
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
