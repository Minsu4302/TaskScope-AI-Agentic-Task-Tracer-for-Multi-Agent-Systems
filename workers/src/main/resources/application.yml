spring:
  application:
    name: taskscope-workers
  main:
    web-application-type: none   # HTTP 서버 없이 RestClient만 사용
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:taskscope}
    password: ${RABBITMQ_PASS:taskscope}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:14321}/v1/traces
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:14321}/v1/metrics
  endpoints:
    web:
      exposure:
        include: health,info,metrics

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  max-tokens: ${LLM_MAX_TOKENS:4096}

github:
  token: ${GITHUB_TOKEN:}
